name: Deploy to Cloud Run

on:
  push:
    branches:
      - V1

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: vecto-app
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Authorize Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Container
        run: |-
          docker build -t "us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}" .
          docker push "us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}"

      - name: Deploy to Cloud Run
        uses: 'google-github-actions/deploy-cloudrun@v2'
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: "us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          flags: '--allow-unauthenticated'
